<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Girl + Environment Community Hub</title>
    <script>
      (function redirectToSpaEntry() {
        var path = window.location.pathname || "/";
        var search = window.location.search ? window.location.search.slice(1) : "";
        var hash = window.location.hash ? window.location.hash.slice(1) : "";
        var next = "/?p=" + encodeURIComponent(path);

        if (search) {
          next += "&q=" + encodeURIComponent(search);
        }

        if (hash) {
          next += "&h=" + encodeURIComponent(hash);
        }

        window.location.replace(next);
      })();
    </script>
  </head>
  <body></body>
</html>
