<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPE Hub</title>
    <script>
      (function () {
        var search = window.location.search ? window.location.search.slice(1) : "";
        var hash = window.location.hash ? window.location.hash.slice(1) : "";
        var next = "/?p=" + encodeURIComponent("/login");
        if (search) next += "&q=" + encodeURIComponent(search);
        if (hash) next += "&h=" + encodeURIComponent(hash);
        window.location.replace(next);
      })();
    </script>
  </head>
  <body>
    <p>Loading GPE Hub...</p>
  </body>
</html>
